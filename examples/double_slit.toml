name = "double_slit"
experiment = "double_slit"

[grid]
n = 64
length = 10.0

[wave_packet]
center = [-3.2, 0.0]
sigma = 0.45
momentum = [6.0, 0.0]

[potential]
kind = "double_slit"
height = 120.0
barrier_x = 0.0
barrier_width = 0.25
slit_width = 0.45
slit_separation = 1.2

[solver]
dt = 0.0015
tf = 1.2
frame_interval = 0.03

[measurement]
kind = "which_path"

[output]
fps = 20
render_video = false
